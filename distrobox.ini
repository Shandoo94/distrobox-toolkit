[office]
image=docker.io/archlinux/archlinux:latest
pull=true
init=true
nvidia=false
root=false

additional_packages="zsh eza fzf zoxide git curl wget libreoffice texstudio texlive-latex texlive-bibtexextra texlive-latexextra texlive-pictures texlive-mathscience texlive-plaingeneric texlive-latexrecommended texlive-langgerman texlive-langenglish hunspell biber inkscape noto-fonts"

pre_init_hooks=pacman -Syu --noconfirm

entry=true
start_now=false

[python-dev]
image=docker.io/archlinux/archlinux:latest
pull=true
init=true
nvidia=false
root=false

additional_packages="zsh eza fzf zoxide python uv git curl wget base-devel texlive-mathscience"

pre_init_hooks=pacman -Syu --noconfirm

entry=true
start_now=false

[rust-dev]
image=docker.io/archlinux/archlinux:latest
pull=true
init=true
additional_packages=zsh eza fzf zoxide base-devel git curl wget openssl rustup
